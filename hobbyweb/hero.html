<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <link href="navbar.css" rel="stylesheet"/>
  <style>
    /* ─── PAGE HEADER ────────────────────────────────────────── */
    .page-hero {

      margin-bottom: 0.5rem;

      color: var(--muted);
      max-width: 560px;

<body>

<!-- PAGE HERO -->
<div class="page-hero">
  <div class="container">
    <p class="section-label">Training Library</p>
    <h1>Workouts</h1>
    <p class="mt-2">Select your goal. Learn your split. Master each muscle group with science-backed volume and exercise selection.</p>
  </div>
</div>

</html>
